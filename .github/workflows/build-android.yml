name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install -g @capacitor/cli

      - name: Sync Android
        run: npx cap sync android

      - name: Fix build.gradle after sync
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Enable AndroidX
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Fix app build.gradle - remove core-ktx
        run: |
          sed -i "s/implementation 'androidx.core:core-ktx:1.12.0'/\/\/ implementation 'androidx.core:core-ktx:1.12.0'/" android/app/build.gradle

      - name: Create missing resources
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-night
          
          # Create colors.xml
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1a1a2e</color>
              <color name="colorPrimaryDark">#1a1a2e</color>
              <color name="colorAccent">#d4a843</color>
          </resources>
          EOF
          
          # Create strings.xml
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Domino</string>
              <string name="title_activity_main">Domino</string>
              <string name="package_name">com.almnjshy.domino</string>
              <string name="custom_url_scheme">com.almnjshy.domino</string>
          </resources>
          EOF
          
          # Create styles.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF
          
          # Create ic_launcher placeholder (simple transparent PNG)
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            # Create a simple 1x1 transparent PNG using Python
            python3 -c "
import struct
import zlib

def create_png(width, height):
    # PNG signature
    signature = b'\x89PNG\r\n\x1a\n'
    
    # IHDR chunk
    ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0)
    ihdr_crc = zlib.crc32(b'IHDR' + ihdr_data) & 0xffffffff
    ihdr = struct.pack('>I', len(ihdr_data)) + b'IHDR' + ihdr_data + struct.pack('>I', ihdr_crc)
    
    # IDAT chunk (compressed image data)
    raw_data = b'\x00' + b'\x00\x00\x00\x00' * width  # Transparent row
    compressed = zlib.compress(raw_data * height)
    idat_crc = zlib.crc32(b'IDAT' + compressed) & 0xffffffff
    idat = struct.pack('>I', len(compressed)) + b'IDAT' + compressed + struct.pack('>I', idat_crc)
    
    # IEND chunk
    iend_crc = zlib.crc32(b'IEND') & 0xffffffff
    iend = struct.pack('>I', 0) + b'IEND' + struct.pack('>I', iend_crc)
    
    return signature + ihdr + idat + iend

sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
for d, size in sizes.items():
    with open(f'android/app/src/main/res/{d}/ic_launcher.png', 'wb') as f:
        f.write(create_png(size, size))
    with open(f'android/app/src/main/res/{d}/ic_launcher_round.png', 'wb') as f:
        f.write(create_png(size, size))
    with open(f'android/app/src/main/res/{d}/ic_launcher_foreground.png', 'wb') as f:
        f.write(create_png(size, size))
" 2>/dev/null || echo "Python PNG creation failed, using touch"
            
            # Fallback: just create empty files if Python fails
            if [ ! -f "android/app/src/main/res/$dir/ic_launcher.png" ]; then
              touch "android/app/src/main/res/$dir/ic_launcher.png"
              touch "android/app/src/main/res/$dir/ic_launcher_round.png"
              touch "android/app/src/main/res/$dir/ic_launcher_foreground.png"
            fi
          done

      - name: Fix AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.almnjshy.domino.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
              <uses-permission android:name="android.permission.INTERNET" />
          </manifest>
          EOF

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
